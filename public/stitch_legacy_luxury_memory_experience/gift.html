<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_2 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Luxury Gift Icon: A stylized Cube (Gift Box) with a Ribbon
const giftGroup = new THREE.Group();

// Box
const boxGeo = new THREE.BoxGeometry(2, 2, 2);
const boxMat = new THREE.MeshPhongMaterial({ 
    color: 0x031632, // Midnight Navy
    shininess: 100 
});
const box = new THREE.Mesh(boxGeo, boxMat);
giftGroup.add(box);

// Ribbon (Gold)
const ribbonVerticalGeo = new THREE.BoxGeometry(0.4, 2.1, 2.1);
const ribbonHorizontalGeo = new THREE.BoxGeometry(2.1, 0.4, 2.1);
const ribbonMat = new THREE.MeshPhongMaterial({ 
    color: 0xD4A44F, // Warm Gold
    shininess: 150 
});

const vRibbon = new THREE.Mesh(ribbonVerticalGeo, ribbonMat);
const hRibbon = new THREE.Mesh(ribbonHorizontalGeo, ribbonMat);
giftGroup.add(vRibbon);
giftGroup.add(hRibbon);

// Bow (Spheres as stylized bow)
const bowGeo = new THREE.SphereGeometry(0.35, 32, 32);
const bow1 = new THREE.Mesh(bowGeo, ribbonMat);
bow1.position.set(0.3, 1.1, 0);
const bow2 = new THREE.Mesh(bowGeo, ribbonMat);
bow2.position.set(-0.3, 1.1, 0);
giftGroup.add(bow1);
giftGroup.add(bow2);

scene.add(giftGroup);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xD4A44F, 1, 100);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Floating Animation
function animate() {
    requestAnimationFrame(animate);
    
    giftGroup.rotation.y += 0.005;
    giftGroup.position.y = Math.sin(Date.now() * 0.001) * 0.2;
    
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_2 -->
</body>
</html>
